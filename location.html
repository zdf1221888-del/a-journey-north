  <script>
    // Albums dropdown (desktop click)
    const albumsToggle = document.querySelector("#nov .has-dropdown .dropdown-toggle");
    const albumsItem = document.querySelector("#nov .has-dropdown");

    if (albumsToggle && albumsItem){
      albumsToggle.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        albumsItem.classList.toggle("open");
        albumsToggle.setAttribute(
          "aria-expanded",
          albumsItem.classList.contains("open") ? "true" : "false"
        );
      });

      const menu = albumsItem.querySelector(".dropdown-menu");
      if (menu) menu.addEventListener("click", (e) => e.stopPropagation());

      document.addEventListener("click", () => {
        albumsItem.classList.remove("open");
        albumsToggle.setAttribute("aria-expanded", "false");
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape"){
          albumsItem.classList.remove("open");
          albumsToggle.setAttribute("aria-expanded", "false");
        }
      });

      const header = document.getElementById("siteHeader");

        let lastScroll = window.scrollY;

        window.addEventListener("scroll", () => {

        const currentScroll = window.scrollY;

        if(currentScroll > lastScroll && currentScroll > 80){
            header.classList.add("is-hidden");
        }else{
            header.classList.remove("is-hidden");
        }

        lastScroll = currentScroll;

        });
    }

    // Mobile hamburger
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    function closeMobileMenu(){
      if (!mobileMenu) return;
      mobileMenu.classList.remove("is-open");
      if (menuBtn) menuBtn.setAttribute("aria-expanded", "false");
    }

    if (menuBtn && mobileMenu){
      menuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = mobileMenu.classList.toggle("is-open");
        menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
      });

      mobileMenu.addEventListener("click", (e) => e.stopPropagation());

      document.addEventListener("click", closeMobileMenu);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeMobileMenu();
      });
    }

    // Reveal on scroll
    const reveals = document.querySelectorAll(".reveal");

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting){
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.12
    });

    reveals.forEach(item => observer.observe(item));

    // Mobile: hide header on scroll down, show on scroll up
    const header = document.getElementById("siteHeader");
    let lastY = window.scrollY;
    let ticking = false;

    function handleScroll(){
      const isMobile = window.matchMedia("(max-width: 768px)").matches;
      if (!isMobile || !header) return;

      const y = window.scrollY;
      const goingDown = y > lastY;

      if (goingDown && y > 20){
        header.classList.add("is-hidden");
        closeMobileMenu();
      } else {
        header.classList.remove("is-hidden");
      }

      lastY = y;
    }

    window.addEventListener("scroll", () => {
      if (!ticking){
        window.requestAnimationFrame(() => {
          handleScroll();
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });

    const backToTopBtn = document.getElementById("backToTop");

    if (backToTopBtn){
    backToTopBtn.addEventListener("click", () => {
        window.scrollTo({
        top: 0,
        behavior: "smooth"
        });
    });
    }
  </script>
